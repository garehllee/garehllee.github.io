    html, body { width:100%; height:100%; overflow:hidden; }

    #nav-section {
      position: fixed;
      top: 5px; /* sit below the 5px gradient bar */
      left: 0; right: 0;
      z-index: 300;
      background: white;
      max-width: none !important; /* override * { max-width:100vw } so it spans full width */
      width: 100%;
    }
    #nav-section nav { position: relative; } /* cancel style2.css sticky */

    #viewport {
      position:fixed; top:var(--nav-h, 80px); left:0; right:0; bottom:0;
      overflow:hidden; cursor:grab;
      user-select:none;
    }
    #viewport.dragging { cursor:grabbing; }
    #canvas { position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; }
    #connections { position:absolute; top:0; left:0; pointer-events:none; z-index:0; }

    .cluster { position:absolute; transform:translate(-50%,-50%); }
    .cluster:hover { z-index:100; }

    .photo-card {
      position:absolute; cursor:pointer;
      transition:transform 0.18s ease, box-shadow 0.18s ease; z-index:1;
    }
    .photo-card:hover {
      z-index:10;
      transform:var(--base-transform) scale(1.07) !important;
      box-shadow:0 12px 36px rgba(20,20,20,0.18);
    }
    .photo-card img {
      display:block; object-fit:cover; pointer-events:none;
      width:var(--photo-size); height:var(--photo-size);
      opacity:0; transition:opacity 0.3s ease;
    }
    .photo-card img.loaded { opacity:1; }

    /* Caption that appears on hover */
    .photo-caption {
      position:absolute;
      bottom:calc(100% + 6px);
      left:50%;
      transform:translateX(-50%);
      white-space:nowrap;
      background:white;
      color:var(--reg);
      font-family:var(--paragraphfam);
      font-size:16px;
      font-weight:var(--regular);
      letter-spacing:0.01em;
      padding:5px 10px;
      border:1px solid var(--reg);
      pointer-events:none;
      opacity:0;
      transition:opacity 0.15s ease, transform 0.15s ease;
      transform:translateX(-50%) translateY(4px);
      z-index:20;
    }
    .photo-card:hover .photo-caption {
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    #ui { position:fixed; top:var(--nav-h, 80px); left:0; right:0; bottom:0; pointer-events:none; z-index:200; }

    #zoom-controls { position:absolute; bottom:28px; right:28px; pointer-events:all; display:flex; flex-direction:column; }
    .zoom-btn {
      width:36px; height:36px; background:white;
      border:1px solid rgba(20,20,20,0.18); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--headerfam); font-size:20px; font-weight:var(--regular);
      color:var(--reg); transition:background 0.15s, color 0.15s; line-height:1;
    }
    .zoom-btn:first-child { border-radius:2px 2px 0 0; }
    .zoom-btn:last-child  { border-radius:0 0 2px 2px; border-top:none; }
    .zoom-btn:hover { background:var(--reg); color:white; }

    #overlay { position:fixed; top:var(--nav-h, 80px); left:0; right:0; bottom:0; pointer-events:none; z-index:350; }

    #mobile-msg {
      display:none; position:fixed; inset:0; background:white; z-index:9999;
      align-items:center; justify-content:center; flex-direction:column;
      gap:20px; text-align:center; padding:48px;
    }
    #mobile-msg p { font-family:var(--paragraphfam); font-size:var(--p); color:var(--reg); opacity:0.55; }
    #mobile-msg a { font-family:var(--secondaryfamregular); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent); padding-bottom:2px; }

    @media (max-width:768px) {
      #mobile-msg { display:flex; }
      #viewport, #ui, #overlay, #nav-section { display:none; }
    }
  </style>

  /* ════════════════════════════════════════════════════════════
     ⚙️  CONFIG — tweak these two values to taste
     ════════════════════════════════════════════════════════════
     PHOTO_SIZE  px  — width & height of each thumbnail square
                       try: 50 (tiny), 74 (default), 110 (large)

     SPREAD      px  — how far photos scatter from their cluster
                       center. scales automatically with photo size.
                       try: 80 (tight), 130 (default), 220 (loose)
  ════════════════════════════════════════════════════════════ */
  const PHOTO_SIZE = 100;  // ← change me
  const SPREAD     = 250;  // ← change me

  // Inject PHOTO_SIZE as a CSS variable so the stylesheet stays in sync
  document.documentElement.style.setProperty('--photo-size', PHOTO_SIZE + 'px');

  // Measure the actual nav height and set it as a CSS variable so
  // #viewport, #ui, and #overlay all sit exactly below it.
  const navSection = document.getElementById('nav-section');
  const NAV_H = navSection.offsetHeight;
  document.documentElement.style.setProperty('--nav-h', NAV_H + 'px');
  const MIN_ZOOM=0.15, MAX_ZOOM=3.5, INITIAL_ZOOM=0.82;

  /* ── Image loading ───────────────────────────────────────────────
     Images are already compressed to ≤400px. Set src directly and
     let the browser prioritise — no IntersectionObserver needed
     (it can't track positions on a CSS-transformed canvas anyway).
  ─────────────────────────────────────────────────────────────── */

  function photoLayout(i,total){
    if(total===1) return {dx:0,dy:0,rot:0};
    const a=i*2.399963, r=SPREAD*0.35*Math.sqrt(i+1);
    return {dx:Math.cos(a)*r, dy:Math.sin(a)*r*0.82, rot:Math.sin(i*1.618)*5};
  }

  const canvas=document.getElementById('canvas'), svg=document.getElementById('connections');
  let vpW=window.innerWidth, vpH=window.innerHeight-NAV_H;
  let panX=vpW/2, panY=vpH/2, zoom=INITIAL_ZOOM, selectedCard=null;

  PROJECTS.forEach(p=>{
    const cl=document.createElement('div'); cl.className='cluster';
    cl.style.left=p.x+'px'; cl.style.top=p.y+'px';
    p.photos.forEach((ph,i)=>{
      const {dx,dy,rot}=photoLayout(i,p.photos.length);
      const card=document.createElement('div'); card.className='photo-card';
      const bt=`translate(calc(${dx}px - 50%),calc(${dy}px - 50%)) rotate(${rot}deg)`;
      card.style.cssText=`left:50%;top:50%;--base-transform:${bt};transform:${bt};`;
      const img=document.createElement('img');
      img.src=ph.src;
      img.loading='lazy';
      img.decoding='async';
      img.alt=ph.caption||p.name; img.draggable=false;
      img.width=PHOTO_SIZE; img.height=PHOTO_SIZE;
      img.onload=()=>img.classList.add('loaded');
      if(img.complete) img.classList.add('loaded');

      // Hover caption: project name + ↗
      const caption=document.createElement('div');
      caption.className='photo-caption';
      caption.textContent=p.name+' ↗';

      card.appendChild(img);
      card.appendChild(caption);
      card.addEventListener('click', e => { e.stopPropagation(); if(!moved) window.location.href=p.url; });
      cl.appendChild(card);
    });
    canvas.appendChild(cl);
  });

  function drawConnections(){
    svg.innerHTML='';
    const th=700;
    for(let a=0;a<PROJECTS.length;a++) for(let b=a+1;b<PROJECTS.length;b++){
      const pa=PROJECTS[a],pb=PROJECTS[b], d=Math.hypot(pa.x-pb.x,pa.y-pb.y);
      if(d<th){
        const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('x1',pa.x);ln.setAttribute('y1',pa.y);ln.setAttribute('x2',pb.x);ln.setAttribute('y2',pb.y);
        ln.setAttribute('stroke','#141414');ln.setAttribute('stroke-width','1');ln.setAttribute('stroke-dasharray','3 7');ln.setAttribute('opacity',(1-d/th)*0.1);
        svg.appendChild(ln);
      }
    }
    const xs=PROJECTS.map(p=>p.x),ys=PROJECTS.map(p=>p.y),pad=600;
    const [mnX,mxX]=[Math.min(...xs)-pad,Math.max(...xs)+pad];
    const [mnY,mxY]=[Math.min(...ys)-pad,Math.max(...ys)+pad];
    svg.setAttribute('width',mxX-mnX);svg.setAttribute('height',mxY-mnY);
    svg.style.left=mnX+'px';svg.style.top=mnY+'px';
    svg.setAttribute('viewBox',`${mnX} ${mnY} ${mxX-mnX} ${mxY-mnY}`);
  }
  drawConnections();

  function applyTransform(){
    const t=`translate(${panX}px,${panY}px) scale(${zoom})`;
    canvas.style.transform=t; svg.style.transform=t;
  }
  applyTransform();

  const vp=document.getElementById('viewport');
  let drag=false,moved=false,sx=0,sy=0,spx=0,spy=0;
  vp.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;moved=false;sx=e.clientX;sy=e.clientY;spx=panX;spy=panY;vp.classList.add('dragging');});
  window.addEventListener('mousemove',e=>{if(!drag)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;panX=spx+dx;panY=spy+dy;applyTransform();});
  window.addEventListener('mouseup',()=>{drag=false;vp.classList.remove('dragging');});

  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    const f=e.deltaY<0?1.1:0.9,pz=zoom;
    zoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,zoom*f));
    panX=mx-(mx-panX)*(zoom/pz); panY=my-(my-panY)*(zoom/pz); applyTransform();
  },{passive:false});

  let lt=null,ltd=null;
  vp.addEventListener('touchstart',e=>{
    if(e.touches.length===1){lt=true;moved=false;sx=e.touches[0].clientX;sy=e.touches[0].clientY;spx=panX;spy=panY;}
    else if(e.touches.length===2) ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  vp.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&lt){const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;panX=spx+dx;panY=spy+dy;applyTransform();}
    else if(e.touches.length===2&&ltd!==null){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const pz=zoom; zoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,zoom*d/ltd));
      panX=cx-(cx-panX)*(zoom/pz);panY=cy-(cy-panY)*(zoom/pz);ltd=d;applyTransform();
    }
  },{passive:false});
  vp.addEventListener('touchend',()=>{lt=null;ltd=null;});

  function zoomBy(f){const cx=window.innerWidth/2,cy=(window.innerHeight-NAV_H)/2,pz=zoom;zoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,zoom*f));panX=cx-(cx-panX)*(zoom/pz);panY=cy-(cy-panY)*(zoom/pz);applyTransform();}
  document.getElementById('zoom-in').addEventListener('click',()=>zoomBy(1.25));
  document.getElementById('zoom-out').addEventListener('click',()=>zoomBy(0.8));
  window.addEventListener('resize',()=>{const dw=window.innerWidth-vpW,dh=(window.innerHeight-NAV_H)-vpH;panX+=dw/2;panY+=dh/2;vpW=window.innerWidth;vpH=window.innerHeight-NAV_H;applyTransform();});
  </script>

    function hideMenu(){navLinks.style.right="-100vw";wholepage.classList.remove("fixed-position");}
